<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛰️ Sube la Montaña - Host</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ===== PANTALLA HOST: LOBBY ===== -->
    <div id="host-lobby" class="host-screen active">
        <div class="host-lobby-layout">
            <div class="lobby-left">
                <span style="font-size:3.5rem; display:block; margin-bottom:0.5rem; animation: float 3s ease-in-out infinite;">⛰️</span>
                <h1 class="game-title" style="font-size:2.8rem; margin-bottom:0.5rem;">Sube la <span>Montaña</span></h1>
                <p style="color:var(--text-dim); margin-bottom:1rem;">Escanea el QR con tu celular para unirte</p>
                <div class="qr-box">
                    <div id="qr-code"></div>
                </div>
                <div class="room-code-display" id="room-code-text">------</div>
                <p style="color:var(--text-dim); font-size:0.8rem; margin-top:0.5rem;" id="join-url"></p>
                <button id="btn-show-mountain" class="btn-primary" style="margin-top:1.5rem; max-width:260px;" disabled>🏔️ Ver Montaña</button>
            </div>
            <div class="lobby-right">
                <div style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; padding:1.2rem; backdrop-filter:blur(12px);">
                    <h3 style="font-size:1rem; font-weight:900; margin-bottom:0.25rem;">Jugadores en sala</h3>
                    <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:1rem;">
                        <span id="lobby-count">0</span> conectados
                    </p>
                    <div id="lobby-player-list" style="display:flex; flex-direction:column; gap:0.4rem; max-height:400px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== PANTALLA HOST: MONTAÑA ===== -->
    <div id="host-mountain" class="host-screen">
        <div class="host-mountain-layout">
            <!-- Izquierda: Montaña -->
            <div class="host-mountain-wrap">
                <svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#0a0818"/>
                            <stop offset="60%" style="stop-color:#1c1a4a"/>
                            <stop offset="100%" style="stop-color:#2d3561"/>
                        </linearGradient>
                        <linearGradient id="mtnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#f0f6ff"/>
                            <stop offset="22%" style="stop-color:#c5d8ec"/>
                            <stop offset="55%" style="stop-color:#8a7865"/>
                            <stop offset="100%" style="stop-color:#4f4035"/>
                        </linearGradient>
                        <linearGradient id="snowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffffff"/>
                            <stop offset="100%" style="stop-color:#ddf0ff"/>
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>

                    <!-- Sky -->
                    <rect width="400" height="520" fill="url(#skyGrad)"/>

                    <!-- Stars -->
                    <circle cx="30"  cy="20" r="1.5" fill="white" opacity="0.9"/>
                    <circle cx="85"  cy="12" r="1"   fill="white" opacity="0.7"/>
                    <circle cx="155" cy="28" r="2"   fill="white" opacity="0.85"/>
                    <circle cx="260" cy="8"  r="1.5" fill="white" opacity="0.9"/>
                    <circle cx="315" cy="22" r="1"   fill="white" opacity="0.6"/>
                    <circle cx="372" cy="38" r="1.5" fill="white" opacity="0.8"/>
                    <circle cx="55"  cy="52" r="1"   fill="white" opacity="0.5"/>
                    <circle cx="335" cy="58" r="2"   fill="white" opacity="0.7"/>
                    <circle cx="200" cy="15" r="1"   fill="white" opacity="0.6"/>
                    <circle cx="130" cy="45" r="1.5" fill="white" opacity="0.7"/>

                    <!-- Moon -->
                    <circle cx="340" cy="55" r="22" fill="#fff8c4" opacity="0.92" filter="url(#glow)"/>
                    <circle cx="351" cy="49" r="18" fill="#1c1a4a" opacity="0.55"/>

                    <!-- Distant background mountains -->
                    <polygon points="0,400 100,270 200,380 0,380"  fill="#1e1b45" opacity="0.55"/>
                    <polygon points="200,400 310,240 400,340 400,400" fill="#18163c" opacity="0.6"/>

                    <!-- Main mountain -->
                    <polygon points="200,42 18,480 382,480" fill="url(#mtnGrad)"/>

                    <!-- Mountain shadow (right side) -->
                    <polygon points="200,42 200,480 382,480" fill="#3a2f25" opacity="0.28"/>

                    <!-- Snow cap -->
                    <polygon points="200,42 160,128 240,128" fill="url(#snowGrad)" opacity="0.97"/>
                    <polygon points="172,100 163,128 215,128" fill="#eef8ff" opacity="0.75"/>

                    <!-- Trail path -->
                    <path d="M 200 456
                             C 200 438 196 418 193 398
                             C 189 375 184 355 186 325
                             C 188 295 179 268 181 238
                             C 183 208 177 178 180 150
                             C 183 124 186 100 200 58"
                          fill="none" stroke="#c4a87a" stroke-width="2.5"
                          stroke-dasharray="8,5" opacity="0.75"/>

                    <!-- Checkpoint dots (25%, 50%, 75%) -->
                    <circle cx="186" cy="338" r="6" fill="none" stroke="#FFD700" stroke-width="2.5"/>
                    <circle cx="186" cy="338" r="2.5" fill="#FFD700"/>

                    <circle cx="181" cy="228" r="6" fill="none" stroke="#FFD700" stroke-width="2.5"/>
                    <circle cx="181" cy="228" r="2.5" fill="#FFD700"/>

                    <circle cx="183" cy="138" r="6" fill="none" stroke="#FFD700" stroke-width="2.5"/>
                    <circle cx="183" cy="138" r="2.5" fill="#FFD700"/>

                    <!-- Summit flag -->
                    <line x1="200" y1="42" x2="200" y2="12" stroke="white" stroke-width="2.5"/>
                    <polygon points="200,12 226,22 200,32" fill="#FF3333"/>

                    <!-- Trees base left -->
                    <polygon points="50,480 62,452 74,480"  fill="#1a6b2a"/>
                    <polygon points="57,468 62,448 67,468"  fill="#22863a"/>
                    <polygon points="95,480 109,448 123,480" fill="#165922"/>
                    <polygon points="102,465 109,444 116,465" fill="#1e7a2f"/>

                    <!-- Trees base right -->
                    <polygon points="278,480 292,448 306,480" fill="#165922"/>
                    <polygon points="285,465 292,444 299,465" fill="#1e7a2f"/>
                    <polygon points="326,480 338,452 350,480" fill="#1a6b2a"/>
                    <polygon points="333,468 338,448 343,468" fill="#22863a"/>

                    <!-- Ground -->
                    <rect x="0" y="476" width="400" height="44" fill="#22380e" opacity="0.85"/>
                </svg>

                <!-- Tokens overlay -->
                <div id="host-tokens" class="host-tokens-overlay"></div>
            </div>

            <!-- Derecha: Panel -->
            <div class="host-side-panel">
                <div class="host-qr-small">
                    <div id="qr-small"></div>
                    <div class="host-room-code-small" id="side-room-code">------</div>
                    <div style="font-size:0.7rem; color:#555; font-weight:700;">Escanea para unirte</div>
                </div>
                <div style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; padding:0.8rem; flex:1; overflow-y:auto;">
                    <div style="font-size:0.8rem; font-weight:900; margin-bottom:0.6rem; color:var(--text-dim);">🏆 Clasificación</div>
                    <div id="host-leaderboard"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="js/host.js"></script>
</body>
</html>
