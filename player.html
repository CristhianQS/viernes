<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎲 Quiz Tablero - Jugador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ===== PANTALLA 1: UNIRSE ===== -->
    <div id="p-join" class="p-screen active">
        <div class="p-join-content">
            <span style="font-size:4rem; display:block; margin-bottom:0.5rem; animation: float 3s ease-in-out infinite;">🎲</span>
            <h1 class="game-title" style="font-size:2.4rem; margin-bottom:0.4rem;">Quiz <span>Tablero</span></h1>
            <p style="color:var(--text-dim); font-size:0.9rem; margin-bottom:1.5rem;">Quiz multijugador por equipos</p>

            <div class="p-room-badge" id="p-room-badge">Sala: ------</div>

            <div class="input-card" style="width:100%; margin-top:1rem;">
                <label for="p-name">¿Cómo te llamas?</label>
                <input type="text" id="p-name" placeholder="Tu nombre aquí..." maxlength="20" autocomplete="off">
                <button id="btn-join-next" class="btn-primary">Siguiente →</button>
            </div>
            <p id="join-error" style="color:var(--danger); font-size:0.85rem; margin-top:0.75rem; font-weight:700; min-height:1.2em;"></p>
        </div>
    </div>

    <!-- ===== PANTALLA 2: ELEGIR EQUIPO ===== -->
    <div id="p-team" class="p-screen">
        <div class="p-join-content">
            <h2 style="font-size:2rem; font-weight:900; margin-bottom:0.35rem;">Elige tu <span class="highlight">Equipo</span></h2>
            <p style="color:var(--text-dim); margin-bottom:1.5rem;">Selecciona el equipo en el que jugarás</p>
            <div id="team-grid" class="team-grid"></div>
            <button id="btn-team-join" class="btn-primary" disabled style="margin-top:1.2rem; max-width:300px;">¡Unirse al Equipo! 🎲</button>
            <p id="team-error" style="color:var(--danger); font-size:0.85rem; margin-top:0.6rem; font-weight:700; min-height:1.2em;"></p>
        </div>
    </div>

    <!-- ===== PANTALLA 3: ESPERAR / VER TABLERO ===== -->
    <div id="p-wait" class="p-screen">
        <div class="p-wait-content">
            <div id="my-team-display" style="margin-bottom:0.75rem;"></div>
            <div id="watch-status" class="watch-status-text">Esperando...</div>
            <!-- Zona del dado (visible cuando es el turno del equipo y fase dice-ready) -->
            <div id="dice-ui" style="width:100%; max-width:320px;"></div>
            <div id="mini-board" class="mini-board-wrap"></div>
        </div>
    </div>

    <!-- ===== PANTALLA 4: PREGUNTA ===== -->
    <div id="p-question" class="p-screen">
        <div class="p-quiz-content">
            <div class="question-header" style="flex-shrink:0;">
                <div class="player-info">
                    <span id="p-team-hdr" class="hdr-char"></span>
                    <span style="font-weight:800; font-size:0.88rem;">¡Responde!</span>
                </div>
                <div class="q-counter">🎲 Si aciertas, lanzas el dado</div>
            </div>

            <div class="question-card">
                <div id="p-q-category" class="q-category">Categoría</div>
                <p id="p-q-text" class="q-text">Pregunta...</p>
            </div>

            <div id="p-options" class="options-grid"></div>
            <div id="p-feedback" class="feedback-box hidden"></div>
        </div>
    </div>

    <!-- ===== PANTALLA 5: FIN ===== -->
    <div id="p-done" class="p-screen">
        <div class="p-done-content">
            <div id="p-final-emoji" style="font-size:5rem; animation: popIn 0.5s ease;"></div>
            <h2 style="font-size:2rem; font-weight:900;">¡Juego Terminado!</h2>
            <div id="p-final-team" style="font-size:1.1rem; font-weight:800; margin-bottom:0.5rem;"></div>
            <div id="p-final-board" style="width:100%;"></div>
        </div>
    </div>

    <script type="module" src="js/player.js"></script>
</body>
</html>
