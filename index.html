<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛰️ Sube la Montaña - Host</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ===== PANTALLA HOST: LOBBY ===== -->
    <div id="host-lobby" class="host-screen active">
        <div class="host-lobby-layout">
            <div class="lobby-left">
                <span style="font-size:3.5rem; display:block; margin-bottom:0.5rem; animation: float 3s ease-in-out infinite;">⛰️</span>
                <h1 class="game-title" style="font-size:2.8rem; margin-bottom:0.5rem;">Sube la <span>Montaña</span></h1>
                <p style="color:var(--text-dim); margin-bottom:1rem;">Escanea el QR con tu celular para unirte</p>
                <div class="qr-box">
                    <div id="qr-code"></div>
                </div>
                <div class="room-code-display" id="room-code-text">------</div>
                <p style="color:var(--text-dim); font-size:0.8rem; margin-top:0.5rem;" id="join-url"></p>
                <div style="display:flex; gap:0.75rem; margin-top:1.5rem; max-width:320px;">
                    <button id="btn-start-game" class="btn-primary" style="flex:1;" disabled>🚀 Iniciar Juego</button>
                </div>
                <div style="margin-top:0.75rem; max-width:320px;">
                    <a href="admin.html" class="btn-secondary" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:0.4rem; padding:0.6rem 1.2rem; border-radius:10px; font-weight:800; font-size:0.88rem; width:100%;">⚙️ Gestionar Preguntas</a>
                </div>
            </div>
            <div class="lobby-right">
                <div style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; padding:1.2rem; backdrop-filter:blur(12px);">
                    <h3 style="font-size:1rem; font-weight:900; margin-bottom:0.25rem;">Jugadores en sala</h3>
                    <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:1rem;">
                        <span id="lobby-count">0</span> conectados
                    </p>
                    <div id="lobby-player-list" style="display:flex; flex-direction:column; gap:0.4rem; max-height:400px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== PANTALLA HOST: MURO ===== -->
    <div id="host-mountain" class="host-screen">
        <div class="host-mountain-layout">
            <!-- Izquierda: Muro de Escalada -->
            <div class="host-mountain-wrap">
                <svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
                <style>
                    #rh-10 { animation: finishPulse 1.2s ease-in-out infinite alternate; }
                    @keyframes finishPulse {
                        from { opacity:.88; }
                        to   { opacity:1; filter:drop-shadow(0 0 14px #FFD700) drop-shadow(0 0 28px #FFD70088); }
                    }
                    .rh { animation: holdIdle 3s ease-in-out infinite; }
                    .rh:nth-child(odd)  { animation-delay:.4s; }
                    .rh:nth-child(even) { animation-delay:.9s; }
                    @keyframes holdIdle {
                        0%,100% { opacity:.9; }
                        50%     { opacity:1; }
                    }
                </style>
                <defs>
                    <linearGradient id="topG" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700;stop-opacity:.4"/>
                        <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
                    </linearGradient>
                    <radialGradient id="holdShine" cx="35%" cy="30%" r="60%">
                        <stop offset="0%" style="stop-color:white;stop-opacity:.35"/>
                        <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
                    </radialGradient>
                    <radialGradient id="wallLite" cx="50%" cy="0%" r="90%">
                        <stop offset="0%" style="stop-color:white;stop-opacity:.06"/>
                        <stop offset="100%" style="stop-color:black;stop-opacity:0"/>
                    </radialGradient>
                    <filter id="hg" x="-60%" y="-60%" width="220%" height="220%">
                        <feGaussianBlur stdDeviation="3.5" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <filter id="hgBig" x="-80%" y="-80%" width="260%" height="260%">
                        <feGaussianBlur stdDeviation="6" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>

                <!-- Row 0 (y 0-130) alternating -->
                <rect x="0"   y="0"   width="100" height="130" fill="#1f1f28"/>
                <rect x="100" y="0"   width="100" height="130" fill="#1a1a21"/>

                <rect x="300" y="0"   width="100" height="130" fill="#1a1a21"/>
