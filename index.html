<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛰️ Sube la Montaña - Host</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ===== PANTALLA HOST: LOBBY ===== -->
    <div id="host-lobby" class="host-screen active">
        <div class="host-lobby-layout">
            <div class="lobby-left">
                <span style="font-size:3.5rem; display:block; margin-bottom:0.5rem; animation: float 3s ease-in-out infinite;">⛰️</span>
                <h1 class="game-title" style="font-size:2.8rem; margin-bottom:0.5rem;">Sube la <span>Montaña</span></h1>
                <p style="color:var(--text-dim); margin-bottom:1rem;">Escanea el QR con tu celular para unirte</p>
                <div class="qr-box">
                    <div id="qr-code"></div>
                </div>
                <div class="room-code-display" id="room-code-text">------</div>
                <p style="color:var(--text-dim); font-size:0.8rem; margin-top:0.5rem;" id="join-url"></p>
                <div style="display:flex; gap:0.75rem; margin-top:1.5rem; max-width:320px;">
                    <button id="btn-start-game" class="btn-primary" style="flex:1;" disabled>🚀 Iniciar Juego</button>
                </div>
                <div style="margin-top:0.75rem; max-width:320px;">
                    <a href="admin.html" class="btn-secondary" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:0.4rem; padding:0.6rem 1.2rem; border-radius:10px; font-weight:800; font-size:0.88rem; width:100%;">⚙️ Gestionar Preguntas</a>
                </div>
            </div>
            <div class="lobby-right">
                <div style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; padding:1.2rem; backdrop-filter:blur(12px);">
                    <h3 style="font-size:1rem; font-weight:900; margin-bottom:0.25rem;">Jugadores en sala</h3>
                    <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:1rem;">
                        <span id="lobby-count">0</span> conectados
                    </p>
                    <div id="lobby-player-list" style="display:flex; flex-direction:column; gap:0.4rem; max-height:400px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== PANTALLA HOST: MONTAÑA ===== -->
    <div id="host-mountain" class="host-screen">
        <div class="host-mountain-layout">
            <!-- Izquierda: Montaña -->
            <div class="host-mountain-wrap">
                <svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Sky gradient más colorido -->
                        <linearGradient id="skyG" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#0a0412"/>
                            <stop offset="35%" style="stop-color:#2d1b69"/>
                            <stop offset="70%" style="stop-color:#1a3a6e"/>
                            <stop offset="100%" style="stop-color:#0d2a4a"/>
                        </linearGradient>
                        <!-- Mountain gradient rosa/gris/marrón -->
                        <linearGradient id="mtnG" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#f5f8ff"/>
                            <stop offset="18%" style="stop-color:#c8daf5"/>
                            <stop offset="45%" style="stop-color:#8a7865"/>
                            <stop offset="100%" style="stop-color:#4a3525"/>
                        </linearGradient>
                        <linearGradient id="snowG" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffffff"/>
                            <stop offset="100%" style="stop-color:#cce5ff"/>
                        </linearGradient>
                        <!-- Halo de cumbre -->
                        <radialGradient id="summitGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#FFE566;stop-opacity:0.5"/>
                            <stop offset="100%" style="stop-color:#FFE566;stop-opacity:0"/>
                        </radialGradient>
                        <!-- Halo de luna -->
                        <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#fffde7;stop-opacity:0.8"/>
                            <stop offset="60%" style="stop-color:#fff9c4;stop-opacity:0.2"/>
                            <stop offset="100%" style="stop-color:#fff9c4;stop-opacity:0"/>
                        </radialGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                        <filter id="softGlow">
                            <feGaussianBlur stdDeviation="6" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>

                    <!-- Sky -->
                    <rect width="400" height="520" fill="url(#skyG)"/>

                    <!-- Stars -->
                    <circle cx="25" cy="18" r="1.2" fill="white" opacity="0.9"/>
                    <circle cx="65" cy="32" r="0.8" fill="white" opacity="0.7"/>
                    <circle cx="110" cy="12" r="1.5" fill="white" opacity="0.85"/>
                    <circle cx="165" cy="25" r="0.9" fill="white" opacity="0.8"/>
                    <circle cx="230" cy="8"  r="1.3" fill="white" opacity="0.9"/>
                    <circle cx="275" cy="20" r="0.8" fill="white" opacity="0.6"/>
                    <circle cx="320" cy="35" r="1.4" fill="white" opacity="0.85"/>
                    <circle cx="375" cy="15" r="1.0" fill="white" opacity="0.75"/>
                    <circle cx="45"  cy="55" r="0.9" fill="white" opacity="0.5"/>
                    <circle cx="140" cy="48" r="1.1" fill="white" opacity="0.7"/>
                    <circle cx="300" cy="55" r="1.0" fill="white" opacity="0.8"/>
                    <circle cx="355" cy="48" r="1.5" fill="white" opacity="0.65"/>
                    <!-- Estrella grande 4 puntas -->
                    <polygon points="200,22 201.5,26 205,27.5 201.5,29 200,33 198.5,29 195,27.5 198.5,26" fill="white" opacity="0.9"/>

                    <!-- Luna con halo -->
                    <circle cx="340" cy="58" r="35" fill="url(#moonGlow)" opacity="0.6"/>
                    <circle cx="340" cy="58" r="22" fill="#fff8e1" opacity="0.95" filter="url(#glow)"/>
                    <circle cx="352" cy="52" r="18" fill="#2d1b69" opacity="0.6"/>

                    <!-- Nubes lejanas -->
                    <g opacity="0.18">
                        <ellipse cx="70" cy="110" rx="35" ry="12" fill="white"/>
                        <ellipse cx="90" cy="104" rx="22" ry="10" fill="white"/>
                        <ellipse cx="52" cy="107" rx="18" ry="8" fill="white"/>
                    </g>
                    <g opacity="0.12">
                        <ellipse cx="310" cy="95" rx="40" ry="13" fill="white"/>
                        <ellipse cx="335" cy="88" rx="25" ry="11" fill="white"/>
                        <ellipse cx="288" cy="93" rx="20" ry="9" fill="white"/>
                    </g>

                    <!-- Montaña de fondo lejana izquierda -->
                    <polygon points="0,420 90,265 185,380 0,380" fill="#1e1048" opacity="0.65"/>
                    <!-- Montaña de fondo lejana derecha -->
                    <polygon points="215,420 320,235 400,330 400,420" fill="#160d40" opacity="0.7"/>

                    <!-- MONTAÑA PRINCIPAL -->
                    <polygon points="200,42 18,480 382,480" fill="url(#mtnG)"/>
                    <!-- Sombra lado derecho -->
                    <polygon points="200,42 200,480 382,480" fill="#2a1e14" opacity="0.32"/>

                    <!-- Nieve - capa principal -->
                    <polygon points="200,42 158,132 242,132" fill="url(#snowG)" opacity="0.98"/>
                    <!-- Nieve - sombra izquierda -->
                    <polygon points="200,42 158,132 185,132" fill="#e8f4ff" opacity="0.5"/>
                    <!-- Nieve - detalle extra -->
                    <polygon points="170,102 163,132 220,132 210,108" fill="white" opacity="0.4"/>
                    <!-- Halo cumbre -->
                    <ellipse cx="200" cy="55" rx="30" ry="20" fill="url(#summitGlow)"/>

                    <!-- Trail / camino punteado (más brillante) -->
                    <path d="M 200 458 C 200 440 196 420 193 400 C 189 376 184 356 186 326 C 188 296 179 268 181 238 C 183 208 177 178 180 150 C 183 124 186 100 200 58"
                          fill="none" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.5"/>
                    <path d="M 200 458 C 200 440 196 420 193 400 C 189 376 184 356 186 326 C 188 296 179 268 181 238 C 183 208 177 178 180 150 C 183 124 186 100 200 58"
                          fill="none" stroke="white" stroke-width="2.5" stroke-dasharray="6,5" opacity="0.25"/>

                    <!-- Checkpoints numerados -->
                    <!-- 25% -->
                    <circle cx="186" cy="340" r="9" fill="#FF4ECD" opacity="0.9" filter="url(#glow)"/>
                    <circle cx="186" cy="340" r="9" fill="none" stroke="white" stroke-width="1.5"/>
                    <text x="186" y="344" text-anchor="middle" fill="white" font-size="8" font-weight="900" font-family="Arial">1</text>
                    <!-- 50% -->
                    <circle cx="181" cy="228" r="9" fill="#7B2FFF" opacity="0.9" filter="url(#glow)"/>
                    <circle cx="181" cy="228" r="9" fill="none" stroke="white" stroke-width="1.5"/>
                    <text x="181" y="232" text-anchor="middle" fill="white" font-size="8" font-weight="900" font-family="Arial">2</text>
                    <!-- 75% -->
                    <circle cx="183" cy="138" r="9" fill="#00E5FF" opacity="0.9" filter="url(#glow)"/>
                    <circle cx="183" cy="138" r="9" fill="none" stroke="white" stroke-width="1.5"/>
                    <text x="183" y="142" text-anchor="middle" fill="white" font-size="8" font-weight="900" font-family="Arial">3</text>

                    <!-- Bandera en cumbre -->
                    <line x1="200" y1="42" x2="200" y2="8" stroke="white" stroke-width="2.5" filter="url(#glow)"/>
                    <polygon points="200,8 228,18 200,28" fill="#FF4ECD" filter="url(#glow)"/>
                    <polygon points="200,8 228,18 200,28" fill="none" stroke="white" stroke-width="1"/>

                    <!-- Árboles izquierda (más variados) -->
                    <polygon points="42,480 56,448 70,480" fill="#145a23"/>
                    <polygon points="50,466 56,446 62,466" fill="#1c7a31"/>
                    <polygon points="72,480 83,455 94,480" fill="#0f4a1c"/>
                    <polygon points="78,468 83,452 88,468" fill="#196b28"/>
                    <polygon points="98,480 112,446 126,480" fill="#145a23"/>
                    <polygon points="105,463 112,443 119,463" fill="#1e8035"/>
                    <!-- Pequeños arbustos izquierda -->
                    <ellipse cx="56" cy="480" rx="14" ry="5" fill="#0d3a18" opacity="0.8"/>
                    <ellipse cx="83" cy="480" rx="11" ry="4" fill="#0d3a18" opacity="0.8"/>

                    <!-- Árboles derecha -->
                    <polygon points="274,480 288,446 302,480" fill="#145a23"/>
                    <polygon points="281,463 288,443 295,463" fill="#196b28"/>
                    <polygon points="306,480 319,452 332,480" fill="#0f4a1c"/>
                    <polygon points="312,466 319,449 326,466" fill="#1c7a31"/>
                    <polygon points="336,480 349,450 362,480" fill="#145a23"/>
                    <polygon points="343,466 349,447 355,466" fill="#1e8035"/>
                    <!-- Arbustos derecha -->
                    <ellipse cx="288" cy="480" rx="13" ry="5" fill="#0d3a18" opacity="0.8"/>
                    <ellipse cx="319" cy="480" rx="11" ry="4" fill="#0d3a18" opacity="0.8"/>

                    <!-- Suelo -->
                    <rect x="0" y="476" width="400" height="44" fill="#0d2a12" opacity="0.9"/>
                    <rect x="0" y="479" width="400" height="3" fill="#1c5c28" opacity="0.6"/>
                </svg>

                <!-- Tokens overlay -->
                <div id="host-tokens" class="host-tokens-overlay"></div>
            </div>

            <!-- Derecha: Panel -->
            <div class="host-side-panel">
                <div class="host-qr-small">
                    <div id="qr-small"></div>
                    <div class="host-room-code-small" id="side-room-code">------</div>
                    <div style="font-size:0.7rem; color:#555; font-weight:700;">Escanea para unirte</div>
                </div>
                <div style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; padding:0.8rem; flex:1; overflow-y:auto;">
                    <div style="font-size:0.8rem; font-weight:900; margin-bottom:0.6rem; color:var(--text-dim);">🏆 Clasificación</div>
                    <div id="host-leaderboard"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="js/host.js"></script>
</body>
</html>
